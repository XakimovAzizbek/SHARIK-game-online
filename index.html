<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dexo Sphere Strategic Arena</title>
    <link rel="stylesheet" href="index.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

</head>
<body>
    <div id="ui-container">
        <div id="top-bar">
            <div id="player-stats">👥 Players: <span id="alive-count">30</span>/30</div>
            <div id="balance-board">💰: <span id="coin-count">0</span></div>
            <button id="exit-btn">❌ Chiqish</button>
        </div>
        <div id="menu">
            <h1>DEXO ARENA</h1>
            <p>Analog bilan boshqaring va SPLIT bilan hujum qiling!</p>
            <button id="play-btn">OʻYINNI BOSHLASH</button>
        </div>
    </div>

    <div id="controls">
        <div id="analog-container">
            <div id="analog-stick"></div>
        </div>
        <button id="split-btn">SPLIT</button>
    </div>

    <canvas id="gameCanvas"></canvas>
    <script src="index.js"></script>
</body>
</html>
